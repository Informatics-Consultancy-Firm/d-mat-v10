<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Device Assessment Certification - ITN Mass Campaign 2027</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Cinzel:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Oswald:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Oswald', sans-serif;
  background: #e8f0f8;
  min-height: 100vh;
  padding: 20px;
}

.container {
  max-width: 900px;
  margin: 0 auto;
}

/* Assessment Card Styles */
.assessment-card {
  background: white;
  border-radius: 16px;
  border: 2px solid #004080;
  overflow: hidden;
  box-shadow: 0 4px 20px rgba(0,64,128,0.15);
}

.card-header {
  background: linear-gradient(135deg, #004080, #002952);
  padding: 20px 25px;
  border-bottom: 3px solid #ffc107;
}

.card-header h1 {
  color: white;
  font-family: 'Oswald', sans-serif;
  font-size: 1.3rem;
  letter-spacing: 1px;
}

.card-header p {
  color: rgba(255,255,255,0.9);
  font-size: 0.7rem;
  margin-top: 5px;
}

.card-body {
  padding: 25px;
  background: white;
}

.info-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 15px;
  margin-bottom: 25px;
}

.info-box {
  background: #f0f4f8;
  border: 2px solid #004080;
  border-radius: 10px;
  padding: 12px;
  text-align: center;
}

.info-val {
  font-size: 1.5rem;
  font-weight: 700;
  color: #004080;
}

.info-lbl {
  font-size: 0.6rem;
  color: #000000;
  text-transform: uppercase;
  letter-spacing: 1px;
  font-weight: 600;
}

.field {
  margin-bottom: 15px;
}

.label {
  font-size: 0.7rem;
  font-weight: 700;
  color: #004080;
  text-transform: uppercase;
  letter-spacing: 1px;
  display: block;
  margin-bottom: 5px;
}

.input {
  width: 100%;
  padding: 12px 14px;
  background: white;
  border: 2px solid #004080;
  border-radius: 8px;
  color: #000000;
  font-family: 'Oswald', sans-serif;
  font-size: 1rem;
  transition: all 0.2s;
}

.input:focus {
  outline: none;
  border-color: #ffc107;
}

.btn {
  width: 100%;
  padding: 14px;
  background: linear-gradient(135deg, #004080, #0056b3);
  color: white;
  border: none;
  border-radius: 8px;
  font-family: 'Oswald', sans-serif;
  font-size: 0.9rem;
  font-weight: 700;
  letter-spacing: 1px;
  cursor: pointer;
  transition: all 0.3s;
}

.btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 4px 12px rgba(0,64,128,0.3);
}

.attempts-left {
  background: #f0f8ff;
  border-left: 4px solid #ffc107;
  padding: 10px 12px;
  border-radius: 6px;
  margin-top: 15px;
  font-size: 0.8rem;
  color: #000000;
  font-weight: 600;
}

/* Signature Upload Section */
.signature-section {
  margin-top: 20px;
  padding: 15px;
  background: #f0f4f8;
  border: 2px solid #004080;
  border-radius: 10px;
}

.signature-title {
  font-size: 0.8rem;
  font-weight: 700;
  color: #004080;
  margin-bottom: 10px;
  text-transform: uppercase;
}

.signature-row {
  display: flex;
  gap: 15px;
  justify-content: space-between;
}

.signature-upload {
  flex: 1;
  text-align: center;
  padding: 10px;
  background: white;
  border: 1px solid #004080;
  border-radius: 8px;
}

.signature-upload label {
  display: block;
  font-size: 0.7rem;
  font-weight: 700;
  color: #004080;
  margin-bottom: 5px;
  cursor: pointer;
}

.signature-upload input {
  display: none;
}

.signature-preview {
  margin-top: 8px;
  font-size: 0.7rem;
  color: #000000;
}

.signature-preview img {
  max-height: 40px;
  max-width: 120px;
  border: 1px solid #004080;
  padding: 2px;
}

/* Quiz Styles */
.quiz-header {
  display: flex;
  justify-content: space-between;
  margin-bottom: 20px;
  padding-bottom: 15px;
  border-bottom: 2px solid #004080;
}

.progress-bar {
  height: 8px;
  background: #e0e7ee;
  border-radius: 4px;
  overflow: hidden;
  margin-bottom: 20px;
  border: 1px solid #004080;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #004080, #28a745);
  border-radius: 3px;
  transition: width 0.3s;
}

.question-text {
  font-size: 1.1rem;
  font-weight: 600;
  color: #000000;
  margin-bottom: 20px;
  line-height: 1.4;
}

.options {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-bottom: 25px;
}

.option {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 15px;
  background: white;
  border: 2px solid #004080;
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.2s;
}

.option:hover {
  border-color: #ffc107;
  background: #f5f9ff;
}

.option.selected {
  border-color: #ffc107;
  background: #e8f1fb;
}

.option-letter {
  width: 28px;
  height: 28px;
  background: #004080;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  color: white;
}

.option.selected .option-letter {
  background: #ffc107;
  color: #004080;
}

.option-text {
  flex: 1;
  font-size: 0.9rem;
  color: #000000;
  font-weight: 500;
}

.quiz-nav {
  display: flex;
  gap: 10px;
}

.quiz-nav button {
  flex: 1;
  padding: 10px;
  background: white;
  border: 2px solid #004080;
  border-radius: 8px;
  color: #004080;
  font-family: 'Oswald', sans-serif;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
}

.quiz-nav button.primary {
  background: #004080;
  color: white;
}

.quiz-nav button.primary:hover {
  background: #0056b3;
}

/* Result Styles */
.result-banner {
  text-align: center;
  padding: 30px;
  border-radius: 12px;
  margin-bottom: 20px;
}

.result-banner.pass {
  background: linear-gradient(135deg, #1a7a3c, #28a745);
}

.result-banner.fail {
  background: linear-gradient(135deg, #c0392b, #e74c3c);
}

.result-score {
  font-size: 3rem;
  font-weight: 700;
  color: white;
  font-family: 'Oswald', sans-serif;
}

.result-message {
  color: white;
  margin-top: 10px;
  font-size: 1rem;
  font-weight: 600;
}

.retake-info {
  background: #f0f4f8;
  border: 2px solid #004080;
  border-radius: 10px;
  padding: 15px;
  text-align: center;
  margin-top: 20px;
  color: #000000;
  font-weight: 600;
}

/* Certificate Modal */
.modal {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.9);
  z-index: 1000;
  align-items: center;
  justify-content: center;
}

.modal.active {
  display: flex;
}

.modal-content {
  max-width: 95%;
  max-height: 95%;
  overflow: auto;
  background: transparent;
}

.modal-actions {
  text-align: center;
  margin-top: 15px;
}

.modal-actions button {
  padding: 12px 25px;
  margin: 0 8px;
  background: #004080;
  color: white;
  border: none;
  border-radius: 8px;
  font-family: 'Oswald', sans-serif;
  font-weight: 700;
  cursor: pointer;
  font-size: 0.85rem;
}

.modal-actions button.close {
  background: #c0392b;
}

.hidden {
  display: none;
}

.signature-status {
  font-size: 0.7rem;
  margin-top: 5px;
  color: #28a745;
  font-weight: 600;
}
</style>
</head>
<body>
<div class="container">
  <!-- ASSESSMENT SCREEN -->
  <div id="assessmentScreen" class="assessment-card">
    <div class="card-header">
      <h1>DEVICE ASSESSMENT CERTIFICATION</h1>
      <p>2027 ITN Mass Campaign · Sierra Leone</p>
    </div>
    <div class="card-body">
      <div class="info-grid">
        <div class="info-box"><div class="info-val">10</div><div class="info-lbl">Questions</div></div>
        <div class="info-box"><div class="info-val">10/10</div><div class="info-lbl">Pass Mark</div></div>
        <div class="info-box"><div class="info-val">3</div><div class="info-lbl">Attempts</div></div>
      </div>
      
      <div class="field">
        <label class="label">FULL NAME</label>
        <input type="text" id="userName" class="input" placeholder="Enter your full name">
      </div>
      
      <!-- Signature Upload Section -->
      <div class="signature-section">
        <div class="signature-title">OFFICIAL SIGNATURES (Upload before generating certificate)</div>
        <div class="signature-row">
          <div class="signature-upload">
            <label for="ceoSignature">📝 CEO Signature (Mohamed Sillah Kanu)</label>
            <input type="file" id="ceoSignature" accept="image/*" onchange="uploadCEOSignature(this)">
            <div id="ceoPreview" class="signature-preview"></div>
          </div>
          <div class="signature-upload">
            <label for="clSignature">📝 Country Lead Signature (Randwulf A.J. Tucker)</label>
            <input type="file" id="clSignature" accept="image/*" onchange="uploadCountryLeadSignature(this)">
            <div id="clPreview" class="signature-preview"></div>
          </div>
        </div>
      </div>
      
      <div id="attemptsInfo" class="attempts-left"></div>
      <div id="errorMsg" style="color:#c0392b; font-size:0.8rem; text-align:center; margin-top:10px; display:none; font-weight:600;"></div>
      <button class="btn" onclick="startAssessment()">START ASSESSMENT</button>
    </div>
  </div>

  <!-- QUIZ SCREEN -->
  <div id="quizScreen" class="assessment-card" style="display:none;">
    <div class="card-header">
      <h1>DEVICE ASSESSMENT QUIZ</h1>
      <p>Answer all questions correctly to earn your certificate</p>
    </div>
    <div class="card-body">
      <div class="quiz-header">
        <span id="questionCounter" style="font-weight:700; color:#004080;">Question 1/10</span>
        <span id="answeredCount" style="font-weight:700; color:#004080;">0 answered</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
      <div id="questionText" class="question-text"></div>
      <div id="optionsContainer" class="options"></div>
      <div class="quiz-nav">
        <button onclick="previousQuestion()">BACK</button>
        <button id="nextBtn" class="primary" onclick="nextQuestion()">NEXT</button>
        <button id="submitBtn" style="display:none;" class="primary" onclick="submitQuiz()">SUBMIT</button>
      </div>
    </div>
  </div>

  <!-- RESULT SCREEN -->
  <div id="resultScreen" class="assessment-card" style="display:none;">
    <div class="card-body">
      <div id="resultBanner" class="result-banner">
        <div class="result-score" id="scoreDisplay">0/10</div>
        <div class="result-message" id="resultMessage"></div>
      </div>
      <div id="certificateBtnContainer" style="display:none;">
        <button class="btn" onclick="showCertificate()">VIEW CERTIFICATE</button>
      </div>
      <div id="retakeContainer" style="display:none;">
        <div class="retake-info">
          <strong>You did not pass</strong><br>
          <span id="attemptsLeftMsg"></span>
        </div>
        <button class="btn" onclick="retakeQuiz()" style="margin-top:15px;">RETAKE QUIZ</button>
      </div>
      <button class="btn" onclick="resetToStart()" style="margin-top:15px; background:#607080;">BACK TO START</button>
    </div>
  </div>
</div>

<!-- CERTIFICATE MODAL -->
<div id="certificateModal" class="modal">
  <div class="modal-content">
    <div id="certificateHTML"></div>
    <div class="modal-actions">
      <button onclick="downloadCertificatePDF()">DOWNLOAD PDF</button>
      <button class="close" onclick="closeCertificateModal()">CLOSE</button>
    </div>
  </div>
</div>

<script>
// ============================================================
// QUESTIONS based on Device Assessment TOR
// ============================================================
const MASTER_QUESTIONS = [
  { text: "How many mobile devices need to be assessed for the 2027 ITN Mass Campaign?", options: ["5,000 devices", "8,000 devices", "7,000 devices", "10,000 devices"], correct: 2 },
  { text: "What is the total duration of the device assessment exercise?", options: ["5 working days", "7 working days", "10 working days", "14 working days"], correct: 2 },
  { text: "How many assessors will be deployed for the device assessment?", options: ["25 assessors", "30 assessors", "35 assessors", "40 assessors"], correct: 2 },
  { text: "How many devices does each assessor process per day?", options: ["15 devices", "20 devices", "25 devices", "30 devices"], correct: 1 },
  { text: "How many items are on the 14-point assessment checklist?", options: ["10 items", "12 items", "14 items", "16 items"], correct: 2 },
  { text: "What happens if a device fails any single checklist item?", options: ["Continue assessment", "Mark as PASS", "Mark as FAIL immediately", "Retest tomorrow"], correct: 2 },
  { text: "What is the ratio of supervisors to assessors?", options: ["1:3", "1:5", "1:7", "1:10"], correct: 1 },
  { text: "What is the daily output target for all assessors combined?", options: ["500 devices/day", "600 devices/day", "700 devices/day", "800 devices/day"], correct: 2 },
  { text: "Which of the following is part of the 14-point checklist?", options: ["Camera/Scan test", "Internet speed test", "Bluetooth test", "WiFi test"], correct: 0 },
  { text: "What must supervisors do at the end of each day?", options: ["Go home early", "Verify all assessed devices", "Clean the devices", "Charge all devices"], correct: 1 }
];

const STORAGE_KEY = 'device_assessment_data';
const ICF_LOGO = "https://github.com/mohamedsillahkanu/gdp-dashboard-2/raw/6c7463b0d5c3be150aafae695a4bcbbd8aeb1499/ICF-SL.jpg";

let ceoSignature = null;
let countryLeadSignature = null;
let currentUser = { name: '' };
let currentAttempt = 0;
let maxAttempts = 3;
let currentQuestions = [];
let userAnswers = [];
let currentQIndex = 0;
let lastScore = 0;
let hasPassed = false;

// Signature upload handlers
function uploadCEOSignature(input) {
  const file = input.files[0];
  if (file) {
    const reader = new FileReader();
    reader.onload = function(e) {
      ceoSignature = e.target.result;
      document.getElementById('ceoPreview').innerHTML = `<img src="${ceoSignature}" alt="CEO Signature"><div class="signature-status">✓ Signature loaded</div>`;
    };
    reader.readAsDataURL(file);
  }
}

function uploadCountryLeadSignature(input) {
  const file = input.files[0];
  if (file) {
    const reader = new FileReader();
    reader.onload = function(e) {
      countryLeadSignature = e.target.result;
      document.getElementById('clPreview').innerHTML = `<img src="${countryLeadSignature}" alt="Country Lead Signature"><div class="signature-status">✓ Signature loaded</div>`;
    };
    reader.readAsDataURL(file);
  }
}

// Helper functions
function shuffleArray(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function getShuffledQuestions() {
  let shuffled = shuffleArray([...MASTER_QUESTIONS]);
  return shuffled.map(q => {
    const optionsCopy = [...q.options];
    const correctText = q.options[q.correct];
    const shuffledOptions = shuffleArray([...optionsCopy]);
    const newCorrectIndex = shuffledOptions.indexOf(correctText);
    return {
      text: q.text,
      options: shuffledOptions,
      correct: newCorrectIndex
    };
  });
}

function loadUserData() {
  const stored = localStorage.getItem(STORAGE_KEY);
  if (stored) {
    const data = JSON.parse(stored);
    if (data.name === currentUser.name) {
      currentAttempt = data.attempts || 0;
      hasPassed = data.passed || false;
      return { attempts: currentAttempt, passed: hasPassed };
    }
  }
  return { attempts: 0, passed: false };
}

function saveUserData() {
  const data = {
    name: currentUser.name,
    attempts: currentAttempt,
    passed: hasPassed
  };
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

function startAssessment() {
  const name = document.getElementById('userName').value.trim();
  
  if (!name) {
    showError('Please enter your full name');
    return;
  }
  
  currentUser = { name };
  const userData = loadUserData();
  
  if (userData.passed) {
    showError('You have already passed this certification! Certificate is available.');
    return;
  }
  
  if (userData.attempts >= maxAttempts) {
    showError('You have used all 3 attempts. No further retakes allowed.');
    return;
  }
  
  currentAttempt = userData.attempts;
  hasPassed = false;
  currentQuestions = getShuffledQuestions();
  userAnswers = new Array(10).fill(null);
  currentQIndex = 0;
  
  document.getElementById('assessmentScreen').style.display = 'none';
  document.getElementById('quizScreen').style.display = 'block';
  document.getElementById('resultScreen').style.display = 'none';
  
  renderQuestion();
}

function renderQuestion() {
  const q = currentQuestions[currentQIndex];
  document.getElementById('questionCounter').textContent = `Question ${currentQIndex + 1}/10`;
  const answered = userAnswers.filter(a => a !== null).length;
  document.getElementById('answeredCount').textContent = `${answered} answered`;
  document.getElementById('progressFill').style.width = `${((currentQIndex + 1) / 10) * 100}%`;
  document.getElementById('questionText').textContent = q.text;
  
  const optionsContainer = document.getElementById('optionsContainer');
  optionsContainer.innerHTML = '';
  
  q.options.forEach((opt, idx) => {
    const isSelected = userAnswers[currentQIndex] === idx;
    const letter = String.fromCharCode(65 + idx);
    const optionDiv = document.createElement('div');
    optionDiv.className = `option ${isSelected ? 'selected' : ''}`;
    optionDiv.innerHTML = `
      <div class="option-letter">${letter}</div>
      <div class="option-text">${opt}</div>
    `;
    optionDiv.onclick = () => selectOption(idx);
    optionsContainer.appendChild(optionDiv);
  });
  
  const isLast = currentQIndex === 9;
  document.getElementById('nextBtn').style.display = isLast ? 'none' : 'flex';
  document.getElementById('submitBtn').style.display = isLast ? 'flex' : 'none';
}

function selectOption(optionIndex) {
  userAnswers[currentQIndex] = optionIndex;
  renderQuestion();
}

function nextQuestion() {
  if (userAnswers[currentQIndex] === null) {
    alert('Please select an answer before continuing.');
    return;
  }
  if (currentQIndex < 9) {
    currentQIndex++;
    renderQuestion();
  }
}

function previousQuestion() {
  if (currentQIndex > 0) {
    currentQIndex--;
    renderQuestion();
  }
}

function submitQuiz() {
  if (userAnswers[currentQIndex] === null) {
    alert('Please select an answer before submitting.');
    return;
  }
  
  let correctCount = 0;
  for (let i = 0; i < 10; i++) {
    if (userAnswers[i] !== null && userAnswers[i] === currentQuestions[i].correct) {
      correctCount++;
    }
  }
  
  lastScore = correctCount;
  const passed = correctCount === 10;
  
  if (passed) {
    hasPassed = true;
    saveUserData();
  } else {
    currentAttempt++;
    saveUserData();
  }
  
  document.getElementById('quizScreen').style.display = 'none';
  document.getElementById('resultScreen').style.display = 'block';
  
  document.getElementById('scoreDisplay').textContent = `${correctCount}/10`;
  const resultBanner = document.getElementById('resultBanner');
  const resultMessage = document.getElementById('resultMessage');
  const certificateContainer = document.getElementById('certificateBtnContainer');
  const retakeContainer = document.getElementById('retakeContainer');
  
  if (passed) {
    resultBanner.className = 'result-banner pass';
    resultMessage.textContent = 'PASSED! You have successfully completed the certification with 100% score.';
    certificateContainer.style.display = 'block';
    retakeContainer.style.display = 'none';
  } else {
    resultBanner.className = 'result-banner fail';
    const remaining = maxAttempts - currentAttempt;
    if (remaining > 0) {
      resultMessage.textContent = `NOT PASSED. You have ${remaining} attempt(s) remaining.`;
      retakeContainer.style.display = 'block';
      document.getElementById('attemptsLeftMsg').textContent = `You have ${remaining} more attempt(s) left.`;
    } else {
      resultMessage.textContent = 'NOT PASSED. You have used all 3 attempts.';
      retakeContainer.style.display = 'none';
    }
    certificateContainer.style.display = 'none';
  }
}

function retakeQuiz() {
  if (currentAttempt >= maxAttempts) {
    alert('You have no remaining attempts.');
    return;
  }
  
  currentQuestions = getShuffledQuestions();
  userAnswers = new Array(10).fill(null);
  currentQIndex = 0;
  
  document.getElementById('resultScreen').style.display = 'none';
  document.getElementById('quizScreen').style.display = 'block';
  renderQuestion();
}

function resetToStart() {
  document.getElementById('resultScreen').style.display = 'none';
  document.getElementById('quizScreen').style.display = 'none';
  document.getElementById('assessmentScreen').style.display = 'block';
  updateAttemptsDisplay();
}

function updateAttemptsDisplay() {
  const name = document.getElementById('userName').value.trim();
  if (name) {
    const stored = localStorage.getItem(STORAGE_KEY);
    if (stored) {
      const data = JSON.parse(stored);
      if (data.name === name) {
        if (data.passed) {
          document.getElementById('attemptsInfo').innerHTML = '✓ Already certified! Certificate available.';
          return;
        }
        document.getElementById('attemptsInfo').innerHTML = `Attempts used: ${data.attempts || 0}/${maxAttempts} | Remaining: ${maxAttempts - (data.attempts || 0)}`;
        return;
      }
    }
  }
  document.getElementById('attemptsInfo').innerHTML = `3 attempts allowed | 10/10 to pass | Certificate on success`;
}

function showError(msg) {
  const errorEl = document.getElementById('errorMsg');
  errorEl.textContent = msg;
  errorEl.style.display = 'block';
  setTimeout(() => { errorEl.style.display = 'none'; }, 3000);
}

// ============================================================
// CERTIFICATE with QR Code
// ============================================================
function generateQRCodeDataURL(name, score, certId) {
  const qrData = JSON.stringify({
    name: name,
    score: score + "/10",
    certificate_id: certId,
    date: new Date().toISOString().split('T')[0],
    program: "Device Assessment Certification 2027",
    organization: "ICF-SL"
  });
  
  // Create canvas and generate QR code
  const canvas = document.createElement('canvas');
  QRCode.toCanvas(canvas, qrData, { width: 80, margin: 1 }, function(error) {
    if (error) console.error(error);
  });
  return canvas.toDataURL();
}

      </div>
      
      <!-- Gold Decorative Line -->
      <div style="height: 3px; background: linear-gradient(90deg, transparent, #ffc107, #004080, #ffc107, transparent); margin: 15px 0;"></div>
      
      <!-- Title Section -->
      <div style="text-align: center; margin: 10px 0;">
        <div style="font-family: 'Cinzel', serif; font-size: 11px; letter-spacing: 5px; color: #000000; font-weight: 600;">THIS IS TO CERTIFY THAT</div>

      <!-- Gold Decorative Line -->
      <div style="height: 3px; background: linear-gradient(90deg, transparent, #ffc107, #004080, #ffc107, transparent); margin: 15px 0;"></div>
      
      <!-- Body -->
      <div style="text-align: center;">
        <p style="font-size: 14px; font-style: italic; color: #000000; margin: 10px 0; font-weight: 500;">is hereby awarded to</p>
        <div style="font-family: 'Cinzel', serif; font-size: 32px; font-weight: 700; color: #004080; margin: 10px 0; text-transform: uppercase; border-bottom: 3px dotted #ffc107; display: inline-block; padding-bottom: 8px;">${currentUser.name.toUpperCase()}</div>
        <p style="font-size: 14px; margin: 18px 0 10px 0; color: #000000; font-weight: 500;">for successfully completing the</p>
        <p style="font-family: 'Cinzel', serif; font-size: 18px; font-weight: 700; color: #004080;">DEVICE ASSESSMENT CERTIFICATION</p>
        <p style="font-family: 'Cinzel', serif; font-size: 14px; font-weight: 700; color: #28a745; margin: 10px 0;">WITH 100% PASSING SCORE</p>
        <p style="font-size: 12px; margin-top: 8px; color: #000000; font-weight: 500;">Score: ${lastScore}/10 on the final assessment</p>
      </div>
      
      <!-- Gold Decorative Line -->
      <div style="height: 3px; background: linear-gradient(90deg, transparent, #ffc107, #004080, #ffc107, transparent); margin: 20px 0;"></div>

        <!-- CEO Signature -->
        <div style="text-align: center; width: 30%;">
          ${ceoSignatureHtml}
          <div style="font-family: 'Cinzel', serif; font-size: 12px; font-weight: 700; color: #004080; margin-top: 10px;">Mohamed Sillah Kanu</div>

function showCertificate() {
  const certHTML = generateCertificateHTML();
  document.getElementById('certificateHTML').innerHTML = certHTML;
  document.getElementById('certificateModal').classList.add('active');
}

function closeCertificateModal() {
  document.getElementById('certificateModal').classList.remove('active');
}

async function downloadCertificatePDF() {
  const element = document.getElementById('certificateHTML').firstElementChild;
  if (!element) return;
  
  const opt = {
    margin: [0, 0, 0, 0],
    filename: `ICF-SL_Certificate_${currentUser.name.replace(/\s/g, '_')}.pdf`,
    image: { type: 'jpeg', quality: 0.98 },
    html2canvas: { scale: 2, useCORS: true, logging: false },
    jsPDF: { unit: 'mm', format: 'a4', orientation: 'landscape' }
  };
  
  try {
    await html2pdf().set(opt).from(element).save();
  } catch (err) {
    console.error('PDF error:', err);
    alert('Error generating PDF. Please try again.');
  }
}

// Event listeners
document.getElementById('userName').addEventListener('input', updateAttemptsDisplay);

// Close modal on escape
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    closeCertificateModal();
  }
});

// Initial display
updateAttemptsDisplay();
</script>
