<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
<title>Device Assessment Certification - ITN Mass Campaign 2027</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js" integrity="sha512-GsLlZN/3F2ErC5ifS5QtgpiJtWd43JWSuIgh7mbzZ8zBps+dvLusV+eNQATqgA/HdeKFVgA5v3S/cIrLF7QnIg==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }
  
  body {
    font-family: 'Oswald', sans-serif;
    background: linear-gradient(135deg, #e8f0f8 0%, #d4e4f0 100%);
    min-height: 100vh;
    padding: 20px;
  }
  
  .container {
    max-width: 800px;
    margin: 0 auto;
  }
  
  .header {
    background: linear-gradient(135deg, #004080, #0056b3);
    border-radius: 16px 16px 0 0;
    padding: 20px 25px;
    text-align: center;
    border-bottom: 4px solid #ffc107;
  }
  
  .logo-row {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-bottom: 15px;
  }
  
  .logo-box {
    background: white;
    border-radius: 10px;
    padding: 8px 15px;
    display: inline-block;
  }
  
  .logo-box img {
    height: 60px;
    width: auto;
  }
  
  .header h1 {
    color: white;
    font-size: 1.4rem;
    margin: 10px 0 5px;
    letter-spacing: 1px;
  }
  
  .header p {
    color: rgba(255,255,255,0.8);
    font-size: 0.75rem;
  }
  
  .card {
    background: white;
    border-radius: 0 0 16px 16px;
    padding: 25px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
  }
  
  .welcome-icon {
    text-align: center;
    font-size: 3rem;
    margin-bottom: 15px;
  }
  
  .welcome-title {
    font-size: 1.6rem;
    font-weight: 700;
    color: #004080;
    text-align: center;
    margin-bottom: 8px;
  }
  
  .info-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin: 20px 0;
  }
  
  .info-box {
    background: #f0f4f8;
    border-radius: 10px;
    padding: 12px;
    text-align: center;
    border: 2px solid #dce3ec;
  }
  
  .info-val {
    font-size: 1.5rem;
    font-weight: 700;
    color: #004080;
  }
  
  .info-lbl {
    font-size: 0.65rem;
    color: #607080;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  
  .field {
    margin-bottom: 15px;
  }
  
  .label {
    font-size: 0.75rem;
    font-weight: 600;
    color: #004080;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    display: block;
    margin-bottom: 6px;
  }
  
  .input {
    width: 100%;
    padding: 12px 14px;
    border: 2px solid #dce3ec;
    border-radius: 10px;
    font-family: 'Oswald', sans-serif;
    font-size: 1rem;
    transition: all 0.2s;
  }
  
  .input:focus {
    outline: none;
    border-color: #004080;
  }
  
  .btn {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, #004080, #0056b3);
    color: white;
    border: none;
    border-radius: 10px;
    font-family: 'Oswald', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 0.5px;
    cursor: pointer;
    transition: all 0.3s;
    margin-top: 10px;
  }
  
  .btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(0,64,128,0.3);
  }
  
  .btn-gold {
    background: linear-gradient(135deg, #ffc107, #e6a800);
    color: #004080;
  }
  
  .attempts-left {
    background: #fff3e0;
    border-radius: 10px;
    padding: 12px;
    text-align: center;
    margin-top: 15px;
    border-left: 4px solid #ffc107;
    font-size: 0.85rem;
  }
  
  .quiz-header {
    display: flex;
    justify-content: space-between;
    margin-bottom: 20px;
    padding-bottom: 15px;
    border-bottom: 2px solid #e0e7ee;
  }
  
  .progress-bar {
    height: 8px;
    background: #e0e7ee;
    border-radius: 4px;
    overflow: hidden;
    margin-bottom: 20px;
  }
  
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #004080, #28a745);
    border-radius: 4px;
    transition: width 0.3s;
  }
  
  .question-text {
    font-size: 1.2rem;
    font-weight: 600;
    color: #1a2533;
    margin-bottom: 20px;
    line-height: 1.4;
  }
  
  .options {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 25px;
  }
  
  .option {
    display: flex;
    align-items: center;
    gap: 15px;
    padding: 14px 18px;
    border: 2px solid #e0e7ee;
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.2s;
    background: white;
  }
  
  .option:hover {
    border-color: #004080;
    background: #f5f9ff;
  }
  
  .option.selected {
    border-color: #004080;
    background: #e8f1fb;
  }
  
  .option-letter {
    width: 32px;
    height: 32px;
    background: #f0f4f8;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    color: #004080;
  }
  
  .option.selected .option-letter {
    background: #004080;
    color: white;
  }
  
  .option-text {
    flex: 1;
    font-size: 0.95rem;
  }
  
  .quiz-nav {
    display: flex;
    gap: 12px;
    margin-top: 20px;
  }
  
  .quiz-nav button {
    flex: 1;
    padding: 12px;
    border: 2px solid #004080;
    border-radius: 10px;
    background: white;
    color: #004080;
    font-family: 'Oswald', sans-serif;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
  }
  
  .quiz-nav button.primary {
    background: #004080;
    color: white;
  }
  
  .quiz-nav button.primary:hover {
    background: #0056b3;
  }
  
  .result-banner {
    text-align: center;
    padding: 30px;
    border-radius: 16px;
    margin-bottom: 20px;
  }
  
  .result-banner.pass {
    background: linear-gradient(135deg, #1a7a3c, #28a745);
  }
  
  .result-banner.fail {
    background: linear-gradient(135deg, #c0392b, #e74c3c);
  }
  
  .result-score {
    font-size: 3rem;
    font-weight: 700;
    color: white;
  }
  
  .certificate-btn {
    background: linear-gradient(135deg, #ffc107, #e6a800);
    color: #004080;
    margin-top: 15px;
  }
  
  .retake-info {
    background: #f0f4f8;
    border-radius: 12px;
    padding: 15px;
    text-align: center;
    margin-top: 20px;
  }
  
  /* Certificate Styles for PDF - EXACT MATCH to previous design */
  .certificate-for-pdf {
    width: 1100px;
    background: #fffef5;
    border: 12px double #004080;
    padding: 50px 45px;
    position: relative;
    font-family: 'Oswald', 'Arial', sans-serif;
    margin: 0 auto;
  }
  
  .certificate-seal {
    position: absolute;
    top: 30px;
    right: 45px;
    width: 90px;
    height: 90px;
    background: radial-gradient(circle, #ffc107 0%, #e6a800 100%);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2rem;
    border: 2px solid #004080;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }
  
  .certificate-header {
    text-align: center;
    margin-bottom: 25px;
  }
  
  .certificate-flag {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-bottom: 15px;
    font-size: 1.8rem;
  }
  
  .certificate-title {
    font-size: 2rem;
    font-weight: 700;
    color: #004080;
    text-transform: uppercase;
    letter-spacing: 3px;
    margin: 15px 0 8px;
  }
  
  .certificate-subtitle {
    font-size: 1rem;
    color: #607080;
    letter-spacing: 1.5px;
  }
  
  .certificate-divider {
    height: 2px;
    background: linear-gradient(90deg, transparent, #004080, #ffc107, #004080, transparent);
    margin: 25px 0;
  }
  
  .recipient-name {
    font-size: 2rem;
    font-weight: 700;
    color: #004080;
    margin: 20px 0;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    border-bottom: 2px dotted #ffc107;
    display: inline-block;
    padding-bottom: 8px;
  }
  
  .certificate-body {
    text-align: center;
    margin: 30px 0;
  }
  
  .signature-section {
    display: flex;
    justify-content: space-between;
    margin-top: 40px;
    padding-top: 20px;
  }
  
  .signature-box {
    text-align: center;
    width: 45%;
  }
  
  .signature-line {
    width: 220px;
    height: 2px;
    background: #004080;
    margin: 12px auto;
  }
  
  .signature-name {
    font-size: 0.9rem;
    font-weight: 600;
    color: #004080;
  }
  
  .signature-title {
    font-size: 0.75rem;
    color: #607080;
  }
  
  .certificate-footer {
    margin-top: 30px;
    font-size: 0.7rem;
    color: #607080;
    text-align: center;
  }
  
  .certificate-footer hr {
    margin: 12px 0;
    border-color: #dce3ec;
  }
  
  .modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.85);
    z-index: 1000;
    align-items: center;
    justify-content: center;
  }
  
  .modal.active {
    display: flex;
  }
  
  .modal-content {
    background: white;
    max-width: 700px;
    width: 95%;
    border-radius: 16px;
    padding: 25px;
    text-align: center;
    max-height: 90vh;
    overflow-y: auto;
  }
  
  .hidden {
    display: none;
  }
  
  @media (max-width: 600px) {
    .info-grid {
      grid-template-columns: repeat(2, 1fr);
    }
    .question-text {
      font-size: 1rem;
    }
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="logo-row">
      <div class="logo-box">
        <img src="https://github.com/mohamedsillahkanu/gdp-dashboard-2/raw/6c7463b0d5c3be150aafae695a4bcbbd8aeb1499/ICF-SL.jpg" alt="ICF-SL" style="height:50px;">
      </div>
    </div>
    <h1>DEVICE ASSESSMENT CERTIFICATION</h1>
    <p>2027 ITN Mass Campaign · Sierra Leone</p>
  </div>

  <div id="welcomeScreen" class="card">
    <div class="welcome-icon">📱</div>
    <div class="welcome-title">Device Assessment Quiz</div>
    <p style="text-align:center; color:#607080; margin-bottom:20px;">Test your knowledge of the ITN Device Assessment protocol</p>
    
    <div class="info-grid">
      <div class="info-box"><div class="info-val">10</div><div class="info-lbl">Questions</div></div>
      <div class="info-box"><div class="info-val">10/10</div><div class="info-lbl">Pass Mark</div></div>
      <div class="info-box"><div class="info-val">3</div><div class="info-lbl">Attempts</div></div>
      <div class="info-box"><div class="info-val">PDF</div><div class="info-lbl">Certificate</div></div>
    </div>
    
    <div class="field">
      <label class="label">FULL NAME</label>
      <input type="text" id="userName" class="input" placeholder="Enter your full name">
    </div>
    <div class="field">
      <label class="label">DISTRICT</label>
      <input type="text" id="userDistrict" class="input" placeholder="Enter your district">
    </div>
    <div class="field">
      <label class="label">ROLE</label>
      <input type="text" id="userRole" class="input" placeholder="e.g., Assessor, Supervisor">
    </div>
    
    <div id="attemptsInfo" class="attempts-left"></div>
    <div id="welcomeError" style="color:#c0392b; font-size:0.8rem; text-align:center; margin-top:10px; display:none;"></div>
    <button class="btn" onclick="startAssessment()">START ASSESSMENT</button>
  </div>

  <div id="quizScreen" class="card" style="display:none;">
    <div class="quiz-header">
      <span style="font-weight:700; color:#004080;">Device Assessment Quiz</span>
      <span id="questionCounter">Question 1/10</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    <div id="questionText" class="question-text"></div>
    <div id="optionsContainer" class="options"></div>
    <div class="quiz-nav">
      <button onclick="previousQuestion()">BACK</button>
      <button id="nextBtn" class="primary" onclick="nextQuestion()">NEXT</button>
      <button id="submitBtn" style="display:none;" class="primary" onclick="submitQuiz()">SUBMIT</button>
    </div>
  </div>

  <div id="resultScreen" class="card" style="display:none;">
    <div id="resultBanner" class="result-banner">
      <div class="result-score" id="scoreDisplay">0/10</div>
      <div id="resultMessage" style="color:white; margin-top:10px;"></div>
    </div>
    <div id="certificateSection" style="display:none;">
      <button class="btn certificate-btn" onclick="generatePDFCertificate()">DOWNLOAD CERTIFICATE (PDF)</button>
    </div>
    <div id="retakeSection" style="display:none;">
      <div class="retake-info">
        <strong>You did not pass</strong><br>
        <span id="attemptsLeftMsg"></span>
      </div>
      <button class="btn" onclick="retakeQuiz()">RETAKE QUIZ</button>
    </div>
    <button class="btn" style="margin-top:15px; background:#607080;" onclick="resetToWelcome()">BACK TO START</button>
  </div>
</div>

<script>
  const MASTER_QUESTIONS = [
    { text: "How many mobile devices need to be assessed for the 2027 ITN Mass Campaign?", options: ["5,000 devices", "8,000 devices", "7,000 devices", "10,000 devices"], correct: 2 },
    { text: "What is the total duration of the device assessment exercise?", options: ["5 working days", "7 working days", "10 working days", "14 working days"], correct: 2 },
    { text: "How many assessors will be deployed for the device assessment?", options: ["25 assessors", "30 assessors", "35 assessors", "40 assessors"], correct: 2 },
    { text: "How many devices does each assessor process per day?", options: ["15 devices", "20 devices", "25 devices", "30 devices"], correct: 1 },
    { text: "How many items are on the 14-point assessment checklist?", options: ["10 items", "12 items", "14 items", "16 items"], correct: 2 },
    { text: "What happens if a device fails any single checklist item?", options: ["Continue assessment", "Mark as PASS", "Mark as FAIL immediately", "Retest tomorrow"], correct: 2 },
    { text: "What is the ratio of supervisors to assessors?", options: ["1:3", "1:5", "1:7", "1:10"], correct: 1 },
    { text: "What is the daily output target for all assessors combined?", options: ["500 devices/day", "600 devices/day", "700 devices/day", "800 devices/day"], correct: 2 },
    { text: "Which of the following is part of the 14-point checklist?", options: ["Camera/Scan test", "Internet speed test", "Bluetooth test", "WiFi test"], correct: 0 },
    { text: "What must supervisors do at the end of each day?", options: ["Go home early", "Verify all assessed devices", "Clean the devices", "Charge all devices"], correct: 1 }
  ];

  const STORAGE_KEY = 'device_assessment_attempts';
  
  let currentUser = { name: '', district: '', role: '' };
  let currentAttempt = 0;
  let maxAttempts = 3;
  let currentQuestions = [];
  let userAnswers = [];
  let currentQIndex = 0;
  let lastScore = 0;
  
  function shuffleArray(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }
  
  function getShuffledQuestions() {
    let shuffled = [...MASTER_QUESTIONS];
    shuffled = shuffleArray(shuffled);
    
    return shuffled.map(q => {
      const optionsCopy = [...q.options];
      const correctText = q.options[q.correct];
      const shuffledOptions = shuffleArray([...optionsCopy]);
      const newCorrectIndex = shuffledOptions.indexOf(correctText);
      return {
        text: q.text,
        options: shuffledOptions,
        correct: newCorrectIndex
      };
    });
  }
  
  function loadAttempts() {
    const stored = localStorage.getItem(STORAGE_KEY);
    if (stored) {
      const data = JSON.parse(stored);
      if (data.name === currentUser.name) {
        currentAttempt = data.attempts;
        return data.attempts;
      }
    }
    return 0;
  }
  
  function saveAttempts() {
    const data = { name: currentUser.name, attempts: currentAttempt };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  }
  
  function savePassedStatus() {
    const stored = localStorage.getItem(STORAGE_KEY);
    let data = stored ? JSON.parse(stored) : null;
    if (data && data.name === currentUser.name) {
      data.passed = true;
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    } else {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        name: currentUser.name,
        attempts: currentAttempt,
        passed: true
      }));
    }
  }
  
  function startAssessment() {
    const name = document.getElementById('userName').value.trim();
    const district = document.getElementById('userDistrict').value.trim();
    const role = document.getElementById('userRole').value.trim();
    
    if (!name || !district || !role) {
      document.getElementById('welcomeError').textContent = 'Please fill in all fields';
      document.getElementById('welcomeError').style.display = 'block';
      return;
    }
    
    currentUser = { name, district, role };
    
    const stored = localStorage.getItem(STORAGE_KEY);
    let foundAttempts = 0;
    let hasPassed = false;
    if (stored) {
      const data = JSON.parse(stored);
      if (data.name === name) {
        foundAttempts = data.attempts || 0;
        hasPassed = data.passed || false;
      }
    }
    
    if (hasPassed) {
      document.getElementById('welcomeError').textContent = 'You have already passed this certification.';
      document.getElementById('welcomeError').style.display = 'block';
      return;
    }
    
    currentAttempt = foundAttempts;
    
    if (currentAttempt >= maxAttempts) {
      document.getElementById('welcomeError').textContent = 'You have used all 3 attempts. No further retakes allowed.';
      document.getElementById('welcomeError').style.display = 'block';
      return;
    }
    
    currentQuestions = getShuffledQuestions();
    userAnswers = new Array(10).fill(null);
    currentQIndex = 0;
    
    document.getElementById('welcomeScreen').style.display = 'none';
    document.getElementById('quizScreen').style.display = 'block';
    document.getElementById('resultScreen').style.display = 'none';
    
    renderQuestion();
  }
  
  function renderQuestion() {
    const q = currentQuestions[currentQIndex];
    document.getElementById('questionCounter').textContent = `Question ${currentQIndex + 1}/10`;
    document.getElementById('progressFill').style.width = `${((currentQIndex + 1) / 10) * 100}%`;
    document.getElementById('questionText').textContent = q.text;
    
    const optionsContainer = document.getElementById('optionsContainer');
    optionsContainer.innerHTML = '';
    
    q.options.forEach((opt, idx) => {
      const isSelected = userAnswers[currentQIndex] === idx;
      const letter = String.fromCharCode(65 + idx);
      const optionDiv = document.createElement('div');
      optionDiv.className = `option ${isSelected ? 'selected' : ''}`;
      optionDiv.innerHTML = `<div class="option-letter">${letter}</div><div class="option-text">${opt}</div>`;
      optionDiv.onclick = () => selectOption(idx);
      optionsContainer.appendChild(optionDiv);
    });
    
    const isLast = currentQIndex === 9;
    document.getElementById('nextBtn').style.display = isLast ? 'none' : 'flex';
    document.getElementById('submitBtn').style.display = isLast ? 'flex' : 'none';
  }
  
  function selectOption(optionIndex) {
    userAnswers[currentQIndex] = optionIndex;
    renderQuestion();
  }
  
  function nextQuestion() {
    if (userAnswers[currentQIndex] === null) {
      alert('Please select an answer before continuing.');
      return;
    }
    if (currentQIndex < 9) {
      currentQIndex++;
      renderQuestion();
    }
  }
  
  function previousQuestion() {
    if (currentQIndex > 0) {
      currentQIndex--;
      renderQuestion();
    }
  }
  
  function submitQuiz() {
    if (userAnswers[currentQIndex] === null) {
      alert('Please select an answer before submitting.');
      return;
    }
    
    let correctCount = 0;
    for (let i = 0; i < 10; i++) {
      if (userAnswers[i] !== null && userAnswers[i] === currentQuestions[i].correct) {
        correctCount++;
      }
    }
    
    lastScore = correctCount;
    const passed = correctCount === 10;
    
    if (!passed) {
      currentAttempt++;
      saveAttempts();
    } else {
      savePassedStatus();
    }
    
    document.getElementById('quizScreen').style.display = 'none';
    document.getElementById('resultScreen').style.display = 'block';
    
    document.getElementById('scoreDisplay').textContent = `${correctCount}/10`;
    const resultBanner = document.getElementById('resultBanner');
    const resultMessage = document.getElementById('resultMessage');
    const certificateSection = document.getElementById('certificateSection');
    const retakeSection = document.getElementById('retakeSection');
    
    if (passed) {
      resultBanner.className = 'result-banner pass';
      resultMessage.textContent = 'PASSED! You have successfully completed the certification.';
      certificateSection.style.display = 'block';
      retakeSection.style.display = 'none';
    } else {
      resultBanner.className = 'result-banner fail';
      const remaining = maxAttempts - currentAttempt;
      if (remaining > 0) {
        resultMessage.textContent = `NOT PASSED. You have ${remaining} attempt(s) remaining.`;
        retakeSection.style.display = 'block';
        document.getElementById('attemptsLeftMsg').textContent = `You have ${remaining} more attempt(s) left.`;
      } else {
        resultMessage.textContent = 'NOT PASSED. You have used all 3 attempts.';
        retakeSection.style.display = 'none';
      }
      certificateSection.style.display = 'none';
    }
  }
  
  function retakeQuiz() {
    if (currentAttempt >= maxAttempts) {
      alert('You have no remaining attempts.');
      return;
    }
    
    currentQuestions = getShuffledQuestions();
    userAnswers = new Array(10).fill(null);
    currentQIndex = 0;
    
    document.getElementById('resultScreen').style.display = 'none';
    document.getElementById('quizScreen').style.display = 'block';
    renderQuestion();
  }
  
  function resetToWelcome() {
    document.getElementById('resultScreen').style.display = 'none';
    document.getElementById('quizScreen').style.display = 'none';
    document.getElementById('welcomeScreen').style.display = 'block';
    updateAttemptsDisplay();
  }
  
  function updateAttemptsDisplay() {
    const name = document.getElementById('userName').value.trim();
    if (name) {
      const stored = localStorage.getItem(STORAGE_KEY);
      let attempts = 0;
      let passed = false;
      if (stored) {
        const data = JSON.parse(stored);
        if (data.name === name) {
          attempts = data.attempts || 0;
          passed = data.passed || false;
        }
      }
      if (passed) {
        document.getElementById('attemptsInfo').innerHTML = 'Already certified! Certificate available.';
        return;
      }
      document.getElementById('attemptsInfo').innerHTML = `Attempts used: ${attempts}/${maxAttempts} | Remaining: ${maxAttempts - attempts}`;
    } else {
      document.getElementById('attemptsInfo').innerHTML = '3 attempts allowed | 10/10 to pass | PDF Certificate on success';
    }
  }

  document.getElementById('userName').addEventListener('input', updateAttemptsDisplay);
